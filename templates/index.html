<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TejBotFlow - Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">TejBotFlow</div>
    <div class="nav-links">
      {% if user %}
        <span>Welcome, <strong>{{ user }}</strong></span>
        <form action="/logout" method="POST" style="display:inline;">
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="/login">Login</a>
        <a href="/signup">Sign Up</a>
      {% endif %}
    </div>
  </nav>

  
  <div class="main-container">
    <div id="chatbox">
      {% if chat_history %}
        {% for message in chat_history %}
            <div class="{{ message.role }}">
                <p>{{ message.content | safe }}</p>
            </div>
        {% endfor %}
    
      {% else %}
        <p class="no-chat-message">No messages yet. Upload a file and start chatting!</p>
      {% endif %}
    </div>

    <div class="bottom-controls">

      <!-- Upload form -->
      <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data" style="flex:1;" onsubmit="return checkLoginAndUpload();">
        <input type="file" name="file" accept=".pdf,.txt" required />
        <button type="submit">Upload</button>
      </form>

      <!-- Chat input form -->
      <form id="chatForm" action="/chat" method="POST" style="flex-grow:2; display:flex;" onsubmit="return checkLoginAndChat();">
        <input type="text" name="message" placeholder="Ask your PDF..." required />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

<script>
  // Flask se template variable user ko yahan assign kar rahe hain
  const isLoggedIn = {{ 'true' if user else 'false' }};

  function checkLoginAndUpload() {
    if (!isLoggedIn) {
      alert("Please login first to upload files.");
      return false;  // prevent form submission
    }
    return true;
  }

  function checkLoginAndChat() {
    if (!isLoggedIn) {
      alert("Please login first to ask questions.");
      return false;  // prevent form submission
    }
    return true;
  }
</script>

</body>
</html>
